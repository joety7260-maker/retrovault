<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trainer Warz — Premium UK Sneaker Community & Allocations</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal: #5de8d8;
      --blue: #4ab8f0;
      --purple: #b08fff;
      --gold: #f5a800;
      --green: #00ff9d;
      --red: #ff4d6d;
      --text: #f0f0f0;
      --muted: #7a7a90;
    }
    
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; background: #000; }
    
    body {
      color:var(--text);
      font-family:'Barlow',sans-serif;
      overflow-x:hidden;
      background: #000;
    }
    
    /* Solid, dependable background container to avoid pseudo-element blanking */
    .bg-system {
      position:fixed; 
      inset:0;
      background: linear-gradient(160deg,
        rgba(0,18,38,1) 0%, rgba(0,8,28,1) 20%,
        rgba(8,0,35,1) 40%, rgba(18,0,45,1) 55%,
        rgba(5,8,32,1) 70%, rgba(0,18,38,1) 85%,
        rgba(4,0,28,1) 100%);
      z-index:-2;
    }
    
    .bg-glows {
      position:fixed; inset:0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 25%, rgba(93,232,216,0.1) 0%, transparent 55%),
        radial-gradient(ellipse 60% 70% at 85% 15%, rgba(74,184,240,0.08) 0%, transparent 55%),
        radial-gradient(ellipse 50% 50% at 50% 55%, rgba(123,100,255,0.06) 0%, transparent 50%);
      pointer-events:none; z-index:-1;
    }

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:#000; }
    ::-webkit-scrollbar-thumb { background:linear-gradient(var(--teal),var(--purple)); }

    /* ── NAV ── */
    nav {
      position:fixed; top:0; left:0; right:0; z-index:600;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 40px; height:72px;
      background:rgba(0,5,18,0.8);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(93,232,216,0.1);
    }
    .nav-logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
    .nav-logo img { height:44px; width:auto; animation:navGlow 6s ease-in-out infinite; object-fit: contain; }
    .nav-logo span { font-family:'Barlow Condensed', sans-serif; font-size:22px; font-weight:900; letter-spacing: -0.5px; color:#fff; text-transform:uppercase; }
    .nav-logo span em { color:var(--teal); font-style:normal; }
    
    @keyframes navGlow {
      0%,100%{filter:drop-shadow(0 0 8px rgba(93,232,216,0.4));}
      50%{filter:drop-shadow(0 0 14px rgba(176,143,255,0.5));}
    }
    .nav-links { display:flex; gap:28px; list-style:none; }
    .nav-links a {
      font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700;
      letter-spacing:2.5px; text-transform:uppercase; color:var(--muted);
      text-decoration:none; transition:color 0.2s;
    }
    .nav-links a:hover { color:var(--teal); }
    .nav-cta {
      background:linear-gradient(135deg,rgba(93,232,216,0.18),rgba(74,184,240,0.18));
      border:1px solid rgba(93,232,216,0.38);
      color:var(--teal); font-family:'Barlow Condensed',sans-serif;
      font-size:12px; font-weight:800; letter-spacing:2.5px; text-transform:uppercase;
      padding:9px 22px; cursor:pointer;
      clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
      transition:all 0.2s;
    }
    .nav-cta:hover { box-shadow:0 0 22px rgba(93,232,216,0.25); border-color:rgba(93,232,216,0.7); }

    /* ── HERO ── */
    .hero {
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      position:relative; overflow:hidden;
      padding:120px 40px 80px; text-align:center;
    }
    .hero-grid {
      position:absolute; inset:0;
      background-image:
        linear-gradient(rgba(93,232,216,0.04) 1px,transparent 1px),
        linear-gradient(90deg,rgba(93,232,216,0.04) 1px,transparent 1px);
      background-size:55px 55px;
      mask-image:radial-gradient(ellipse at center,black 15%,transparent 72%);
      -webkit-mask-image:radial-gradient(ellipse at center,black 15%,transparent 72%);
    }
    
    .hero-logo { position:relative; z-index:2; margin-bottom: 20px; }
    .hero-logo img { width:clamp(280px,38vw,480px); height:auto; filter:drop-shadow(0 16px 30px rgba(0,0,0,0.7)); }
    
    .hero-tag {
      position:relative; z-index:2; margin-top:4px;
      font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700;
      letter-spacing:5px; text-transform:uppercase; color:var(--muted);
    }
    .hero-sub {
      position:relative; z-index:2; font-size:15px; color:var(--muted);
      max-width:520px; line-height:1.75; margin-top:16px;
    }
    .hero-sub strong { color:var(--teal); font-weight:600; }
    .hero-btns { position:relative; z-index:2; display:flex; gap:16px; margin-top:32px; }

    /* ── RAFFLE HERO PILL ── */
    .raffle-live-pill {
      position:relative; z-index:2;
      display:inline-flex; align-items:center; gap:10px;
      background:rgba(255,77,109,0.12);
      border:1px solid rgba(255,77,109,0.3);
      padding:8px 20px; margin-bottom:20px;
      clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
    }
    .pill-dot { width:7px;height:7px;background:var(--red);border-radius:50%;animation:blink 1.2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }
    .pill-text { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:800; letter-spacing:3px; text-transform:uppercase; color:var(--red); }

    /* ── BUTTONS ── */
    .btn {
      font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:800;
      letter-spacing:2.5px; text-transform:uppercase; padding:14px 32px; cursor:pointer;
      clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
      transition:all 0.25s; border:none; text-decoration:none; display:inline-block;
    }
    .btn-teal {
      background:linear-gradient(135deg,rgba(93,232,216,0.18),rgba(74,184,240,0.15));
      border:1px solid rgba(93,232,216,0.42); color:var(--teal);
    }
    .btn-teal:hover { border-color:rgba(93,232,216,0.8); box-shadow:0 0 28px rgba(93,232,216,0.22); transform:translateY(-2px); }
    .btn-ghost {
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.6);
    }
    .btn-ghost:hover { border-color:rgba(176,143,255,0.45); color:var(--purple); transform:translateY(-2px); }
    .btn-raffle {
      background:linear-gradient(135deg,rgba(255,77,109,0.22),rgba(255,100,80,0.18));
      border:1px solid rgba(255,77,109,0.45); color:var(--red);
      font-size:14px; padding:16px 40px;
    }
    .btn-raffle:hover { box-shadow:0 0 32px rgba(255,77,109,0.3); border-color:rgba(255,77,109,0.8); transform:translateY(-2px); }

    /* ── TICKER ── */
    .ticker {
      background:linear-gradient(90deg,rgba(93,232,216,0.06),rgba(74,184,240,0.1),rgba(176,143,255,0.08),rgba(93,232,216,0.06));
      border-top:1px solid rgba(93,232,216,0.12);
      border-bottom:1px solid rgba(93,232,216,0.12);
      padding:14px 0; overflow:hidden; white-space:nowrap;
    }
    .ticker-track { display:inline-flex; animation:tickScroll 28s linear infinite; }
    .ticker-item { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:800; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.85); padding:0 36px; }
    @keyframes tickScroll { 0%{transform:translateX(0);} 100%{transform:translateX(-50%);} }

    /* ── SECTION SHELL ── */
    .wrap { padding:100px 40px; max-width:1280px; margin:0 auto; position: relative; z-index: 10; }
    .s-label {
      font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700;
      letter-spacing:5px; text-transform:uppercase; color:var(--teal);
      margin-bottom:10px; display:flex; align-items:center; gap:10px;
    }
    .s-label::before { content:''; display:block; width:22px; height:1px; background:var(--teal); }
    .s-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(44px,5.5vw,76px); line-height:1; color:#fff; margin-bottom:40px; }

    /* ── GLASS CARD BASE ── */
    .gc {
      background:rgba(20, 20, 35, 0.6);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:4px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      transition:all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .gc:hover { border-color:rgba(93,232,216,0.25); transform:translateY(-4px); }

    /* ── RAFFLE SECTION ── */
    .raffle-section {
      background: rgba(255, 77, 109, 0.04);
      border:1px solid rgba(255,77,109,0.15);
      border-radius:4px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.45);
      padding:0; overflow:hidden;
    }
    .raffle-top {
      display:grid; grid-template-columns:1.3fr 1fr; min-height:460px;
    }
    @media (max-width: 868px) {
      .raffle-top { grid-template-columns: 1fr; }
      .raffle-info { border-right: none !important; border-bottom: 1px solid rgba(255,255,255,0.06); }
    }
    .raffle-info { padding:56px; border-right:1px solid rgba(255,255,255,0.06); }
    .raffle-visual {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:48px; position:relative; overflow:hidden;
      background:rgba(255, 77, 109, 0.03);
    }
    .raffle-shoe-big { font-size:110px; display:block; margin-bottom:12px; filter:drop-shadow(0 10px 30px rgba(255,77,109,0.25)); }
    .raffle-price-big {
      font-family:'Bebas Neue',sans-serif; font-size:90px; line-height:1;
      color: var(--gold);
    }
    .raffle-price-label { font-family:'Barlow Condensed',sans-serif; font-size:12px; letter-spacing:4px; text-transform:uppercase; color:var(--muted); margin-top:4px; }

    .raffle-name { font-family:'Bebas Neue',sans-serif; font-size:56px; line-height:1; color:#fff; margin:12px 0 6px; }
    .raffle-brand { font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700; letter-spacing:4px; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
    .raffle-desc { font-size:13px; color:var(--muted); line-height:1.7; margin-bottom:24px; max-width:440px; }

    .countdown { display:flex; gap:10px; margin-bottom:28px; }
    .cd {
      text-align:center; min-width:62px;
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.06);
      padding:12px 14px;
    }
    .cd-n { font-family:'Bebas Neue',sans-serif; font-size:36px; color:var(--red); line-height:1; display:block; }
    .cd-l { font-family:'Barlow Condensed',sans-serif; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-top:3px; display:block; }

    .progress-wrap { margin-bottom:28px; }
    .prog-bar { height:5px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; margin-top:7px; }
    .prog-fill { height:100%; width:73%; background:linear-gradient(90deg,var(--red),var(--purple)); box-shadow:0 0 12px rgba(255,77,109,0.5); }
    .prog-labels { display:flex; justify-content:space-between; font-family:'Barlow Condensed',sans-serif; font-size:11px; color:var(--muted); margin-top:5px; letter-spacing:1px; }

    .raffle-winners {
      border-top:1px solid rgba(255,255,255,0.05);
      padding:24px 56px;
      display:flex; align-items:center; gap:32px;
      overflow:hidden;
    }
    .winners-label { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
    .winners-list { display:flex; gap:12px; overflow:hidden; }
    .winner-chip {
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.06);
      padding:6px 14px; white-space:nowrap;
      font-family:'Barlow Condensed',sans-serif; font-size:12px; letter-spacing:1px; color:rgba(255,255,255,0.5);
      clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
    }
    .winner-chip span { color:var(--teal); font-weight:700; }

    /* ── UPCOMING RAFFLES ── */
    .upcoming-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:32px; }
    @media (max-width: 992px) { .upcoming-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 576px) { .upcoming-grid { grid-template-columns: 1fr; } }
    .upcoming-card { padding:28px; cursor:pointer; }
    .upcoming-card .uc-shoe { font-size:44px; display:block; margin-bottom:14px; }
    .upcoming-card .uc-brand { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
    .upcoming-card .uc-name { font-family:'Bebas Neue',sans-serif; font-size:26px; color:#fff; line-height:1; margin-bottom:8px; }
    .upcoming-card .uc-date { font-size:12px; color:var(--muted); margin-bottom:14px; }
    .uc-badge {
      display:inline-block; font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:800;
      letter-spacing:2px; text-transform:uppercase; padding:4px 10px; margin-bottom:12px;
      clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);
    }
    .badge-soon { background:rgba(176,143,255,0.15); color:var(--purple); border:1px solid rgba(176,143,255,0.3); }
    .badge-open { background:rgba(93,232,216,0.15); color:var(--teal); border:1px solid rgba(93,232,216,0.3); }
    .badge-sold { background:rgba(255,255,255,0.06); color:var(--muted); border:1px solid rgba(255,255,255,0.1); }

    /* ── DROPS ── */
    .drops-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
    @media (max-width: 992px) { .drops-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 640px) { .drops-grid { grid-template-columns: 1fr; } .drop-card.featured { grid-column: span 1 !important; } }
    .drop-card { padding:26px; cursor:pointer; }
    .drop-card.featured { grid-column:span 2; background: rgba(93, 232, 216, 0.03); border-color:rgba(93,232,216,0.15); }
    .drop-icon { font-size:52px; display:block; margin:10px 0; }
    .drop-brand { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:3px; }
    .drop-name { font-family:'Bebas Neue',sans-serif; font-size:28px; color:#fff; line-height:1; margin-bottom:6px; }
    .drop-date { font-size:12px; color:var(--muted); margin-bottom:14px; }
    .drop-price { font-family:'Barlow Condensed',sans-serif; font-size:24px; font-weight:700; color:var(--green); margin-bottom:16px; }
    .drop-link { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--teal); text-decoration:none; border-bottom:1px solid rgba(93,232,216,0.28); padding-bottom:2px; transition:all 0.2s; }
    .drop-link:hover { color:#fff; border-color:#fff; }
    .dbadge { display:inline-block; font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:800; letter-spacing:2px; text-transform:uppercase; padding:4px 10px; margin-bottom:12px; clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%); }
    .dbadge-hot { background:rgba(93,232,216,0.15); color:var(--teal); border:1px solid rgba(93,232,216,0.3); }
    .dbadge-lim { background:rgba(245,168,0,0.15); color:var(--gold); border:1px solid rgba(245,168,0,0.3); }
    .dbadge-up  { background:rgba(255,255,255,0.05); color:var(--muted); border:1px solid rgba(255,255,255,0.1); }

    /* ── SHOWCASE ── */
    .showcase-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
    @media (max-width: 992px) { .showcase-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .showcase-grid { grid-template-columns: 1fr; } }
    .sc-card { padding:20px; cursor:pointer; text-align:center; }
    .sc-shoe { font-size:48px; display:block; margin:10px 0; }
    .sc-member { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:4px; }
    .sc-name { font-family:'Bebas Neue',sans-serif; font-size:21px; color:#fff; line-height:1; margin-bottom:8px; }
    .sc-likes { font-family:'Barlow Condensed',sans-serif; font-size:12px; color:var(--teal); font-weight:700; }

    /* ── MARKETPLACE ── */
    .market-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    @media (max-width: 868px) { .market-grid { grid-template-columns: 1fr; } }
    .market-listings { padding:36px; }
    .market-form { padding:36px; background: rgba(176, 143, 255, 0.02); border-color:rgba(176,143,255,0.12); }
    .listing-item { display:flex; align-items:center; gap:16px; padding:16px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
    .listing-item:last-child { border-bottom:none; }
    .listing-shoe { font-size:36px; }
    .listing-info { flex:1; }
    .listing-name { font-family:'Bebas Neue',sans-serif; font-size:22px; color:#fff; line-height:1; }
    .listing-meta { font-family:'Barlow Condensed',sans-serif; font-size:11px; letter-spacing:1px; color:var(--muted); margin-top:3px; }
    .listing-price { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700; color:var(--green); }
    .listing-action { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:800; letter-spacing:2px; text-transform:uppercase; color:var(--teal); background:rgba(93,232,216,0.1); border:1px solid rgba(93,232,216,0.25); padding:6px 14px; cursor:pointer; clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%); transition:all 0.2s; }
    .listing-action:hover { background:rgba(93,232,216,0.2); }

    /* Form Styles */
    .form-title { font-family:'Bebas Neue',sans-serif; font-size:32px; color:#fff; margin-bottom:6px; }
    .form-sub { font-size:13px; color:var(--muted); margin-bottom:24px; line-height:1.6; }
    .form-group { margin-bottom:16px; }
    .form-label { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:7px; }
    .form-input, .form-select {
      width:100%; padding:12px 16px;
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.08);
      color:var(--text); font-family:'Barlow',sans-serif; font-size:14px;
      outline:none; transition:all 0.2s; border-radius:3px;
    }
    .form-input:focus, .form-select:focus { border-color:rgba(93,232,216,0.4); }
    .form-input::placeholder { color:var(--muted); }
    .form-select option { background:#0a0a18; color: #fff; }

    /* ── COMPETITIONS ── */
    .comp-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
    @media (max-width: 768px) { .comp-grid { grid-template-columns: 1fr; } }
    .comp-card { padding:32px; text-align:center; cursor:pointer; }
    .comp-icon { font-size:52px; display:block; margin-bottom:16px; }
    .comp-title { font-family:'Bebas Neue',sans-serif; font-size:28px; color:#fff; margin-bottom:8px; }
    .comp-desc { font-size:13px; color:var(--muted); line-height:1.7; margin-bottom:20px; }
    .comp-prize { font-family:'Barlow Condensed',sans-serif; font-size:18px; color:var(--gold); font-weight:800; letter-spacing:1px; text-transform:uppercase; }
  </style>
</head>
<body>

  <div class="bg-system"></div>
  <div class="bg-glows"></div>

  <nav>
    <a href="#" class="nav-logo">
      <img src="1000100729.png" alt="Trainer Warz Logo">
      <span>TRAINER<em>WARZ</em></span>
    </a>
    <ul class="nav-links">
      <li><a href="#raffle">/raffle</a></li>
      <li><a href="#drops">/drops</a></li>
      <li><a href="#marketplace">/marketplace</a></li>
    </ul>
    <button class="nav-cta" onclick="document.getElementById('marketplace').scrollIntoView();"
