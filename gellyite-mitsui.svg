<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="300" fill="rgba(0,5,18,0.4)"/>
  
  <!-- Shadow -->
  <ellipse cx="150" cy="240" rx="75" ry="15" fill="rgba(0,0,0,0.3)"/>
  
  <!-- ASICS Gel-Lyte III 07 Remastered MITSUI Orange/Cream -->
  <g transform="translate(70, 85)">
    <!-- Cream suede upper base -->
    <path d="M 20 70 Q 25 45 50 38 Q 80 35 110 38 Q 130 42 135 55 Q 138 68 130 82 Q 110 90 70 92 Q 40 90 25 80 Z" fill="#f5e6d3" stroke="#d4c4a8" stroke-width="1.5"/>
    
    <!-- Split tongue - cream left -->
    <path d="M 65 48 L 65 68 Q 65 75 70 78" fill="#f5e6d3" stroke="#d4c4a8" stroke-width="1.5"/>
    
    <!-- Split tongue - cream right -->
    <path d="M 75 48 L 75 68 Q 75 75 70 78" fill="#f5e6d3" stroke="#d4c4a8" stroke-width="1.5"/>
    
    <!-- Teal stripe accent (left) -->
    <path d="M 30 62 Q 50 58 65 62" stroke="#00d4cc" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Teal toe cap accent -->
    <ellipse cx="90" cy="48" rx="25" ry="12" fill="none" stroke="#00d4cc" stroke-width="2"/>
    
    <!-- Orange ASICS stripes (signature 3-stripes) -->
    <path d="M 35 65 Q 90 60 130 70" stroke="#ff6b35" stroke-width="2" stroke-linecap="round"/>
    <path d="M 32 74 Q 95 72 135 78" stroke="#ff6b35" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Heel counter - orange -->
    <path d="M 18 78 Q 15 68 20 52 Q 25 42 40 38" fill="none" stroke="#ff6b35" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Midsole (cream/off-white) -->
    <path d="M 20 88 Q 70 93 140 88" fill="none" stroke="#f5e6d3" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Outsole (cream with orange detailing) -->
    <path d="M 15 92 Q 70 98 145 92" fill="none" stroke="#e8d4b8" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Orange outsole accent -->
    <path d="M 25 94 Q 70 99 135 94" fill="none" stroke="#ff6b35" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
    
    <!-- Collar/heel tab detail (cream) -->
    <path d="M 125 62 Q 140 65 142 75" stroke="#d4c4a8" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Mitsui signature accent line (teal) -->
    <path d="M 70 72 L 70 78" stroke="#00d4cc" stroke-width="1" opacity="0.6"/>
  </g>
</svg>