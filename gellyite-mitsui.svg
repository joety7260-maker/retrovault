<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="300" fill="rgba(0,5,18,0.4)"/>
  
  <!-- Shadow -->
  <ellipse cx="150" cy="240" rx="75" ry="15" fill="rgba(0,0,0,0.3)"/>
  
  <!-- ASICS Gel-Lyte III 'Mitsui' Silhouette -->
  <g transform="translate(75, 95)">
    <!-- Outsole -->
    <path d="M 20 95 Q 60 100 140 95" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Midsole (split design) -->
    <path d="M 15 90 Q 25 88 60 86" fill="none" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
    <path d="M 65 86 Q 100 85 140 90" fill="none" stroke="#ff6b9d" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Toe box (split upper) -->
    <path d="M 25 70 Q 30 45 55 40 Q 75 38 90 40" fill="none" stroke="#00d4ff" stroke-width="3.5" stroke-linejoin="round"/>
    <path d="M 90 40 Q 110 38 130 50 Q 135 65 130 80" fill="none" stroke="#ff6b9d" stroke-width="3.5" stroke-linejoin="round"/>
    
    <!-- Heel counter -->
    <path d="M 18 80 Q 15 70 18 55 Q 22 42 32 38" fill="none" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Gel unit accent -->
    <circle cx="85" cy="85" r="8" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.8"/>
    
    <!-- Retro stripe detail -->
    <path d="M 30 62 Q 85 55 135 68" fill="none" stroke="#ff6b9d" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>